version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: labpassword
      POSTGRES_DB: labdb
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: ./app
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://labuser:labpassword@db:5432/labdb"
      # Enable auto-reload inside the container (change to "false" to disable)
      AUTO_RELOAD: "true"
      # Default script to run inside the container (can be "main.py" or "algorithms.py")
      APP_SCRIPT: "main.py"
    volumes:
      - ./app:/usr/src/app
    # Use the dev runner which will pick up APP_SCRIPT and AUTO_RELOAD
    command: ["sh", "/usr/src/app/dev_runner.sh"]
    ports:
      - "8000:8000" # if you want to expose any web service

  pgadmin:
    image: dpage/pgadmin4:7
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  db-data:
  pgadmin-data:
